version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mixedmeasures-backend
    environment:
      - MM_SECRET_KEY=${MM_SECRET_KEY}
      - MM_DATABASE_PATH=/data/mixedmeasures.db
      - MM_DATA_DIR=/data
      - MM_BACKUP_DIR=/data/backups
    volumes:
      - db_data:/data
    expose:
      - "8000"
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mixedmeasures-frontend
    expose:
      - "80"
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: mixedmeasures-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
