# ─────────────────────────────────────────────────────────────────────────────
# RELEASE — build, sign, and publish the desktop installers
#
# WHAT IT DOES: triggered by pushing a version tag (`v1.0.0`) or manually from the
# Actions tab. It runs the hard pre-ship gates once, then fans out to one clean
# cloud runner per platform/arch — each builds the frontend, freezes the backend
# with PyInstaller, packages the Electron app with electron-builder, signs it (when
# signing creds are present), and uploads the installer + auto-update manifest to a
# DRAFT GitHub Release. You review the draft and click "Publish" to ship.
#
# RELATIONSHIP TO ci.yml: ci.yml is the fast per-push feedback loop (tests only, no
# packaging). THIS workflow does packaging only, and gates on the same checks as
# HARD failures (ci.yml runs the dep audits advisory; here they block the build).
#
# ─────────────────────────────────────────────────────────────────────────────
# CAN IT RUN TODAY? Yes — the unsigned path is fully functional. With NO signing
# secrets set (the current state: Apple Developer ID cert not yet minted, Azure
# Trusted Signing signer-role/secrets not yet wired, repo still private),
# electron-builder builds UNSIGNED installers and this workflow goes green. The
# moment the secrets below exist, the same file produces signed + notarized builds
# with no edits. That is the whole point of wiring it now.
#
# ⚠️  THREE THINGS TO DO BEFORE THIS SHIPS A REAL SIGNED RELEASE:
#
#   (1) SHA-PIN EVERY ACTION. ✅ DONE 2026-06-14 — every `uses:` below is pinned to its
#       v6 commit SHA (trailing `# v6` comment). Re-resolve when intentionally bumping:
#         curl -s https://api.github.com/repos/actions/checkout/commits/v6 | grep -m1 '"sha"'
#
#   (2) ADD THE SIGNING SECRETS (repo → Settings → Secrets and variables → Actions):
#       macOS  (Apple Developer ID Application cert + notarization):
#         CSC_LINK                      base64 of the Developer ID Application .p12
#         CSC_KEY_PASSWORD              password for that .p12
#         APPLE_ID                      Apple ID email used for notarization
#         APPLE_APP_SPECIFIC_PASSWORD   app-specific password for that Apple ID
#         APPLE_TEAM_ID                 Developer Team ID
#       Windows (Azure Trusted / Artifact Signing — profile `MixedMeasures`):
#         AZURE_TENANT_ID  AZURE_CLIENT_ID  AZURE_CLIENT_SECRET   (service principal)
#         AZURE_ENDPOINT                the Trusted Signing account endpoint URL
#         AZURE_CODE_SIGNING_NAME       the Trusted Signing account name
#         AZURE_CERT_PROFILE            certificate profile name (= MixedMeasures)
#       Outstanding Azure step (cert-acquisition plan): assign the service principal
#       the "Trusted Signing Certificate Profile Signer" role before first use.
#
#   (3) VERIFY THE SIGNING FLAGS ON THE FIRST REAL SIGNED RUN. The mac-notarize and
#       win-azure config overrides below are wired from the documented mechanism but
#       have NOT been exercised on a runner (can't be, from the dev WSL box). Treat
#       the first signed build as the validation: confirm a downloaded installer
#       launches on a clean Mac/Windows with no Gatekeeper/SmartScreen block.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags: ["v*"]              # e.g. git tag v1.0.0 && git push origin v1.0.0
  workflow_dispatch:          # manual dry-run from the Actions tab (publishes a draft)

# Publishing a GitHub Release requires write access to repo contents.
permissions:
  contents: write

# Never cancel an in-flight release mid-publish; serialize by tag instead.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Hard pre-ship gates (run once, before any packaging) ────────────────────
  # A tag can land on any commit; don't trust that CI already vetted it. These are
  # the same checks as ci.yml but as HARD failures — a freshly-disclosed CVE or a
  # schema drift must stop a release, not just warn.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements-dev.txt

      # The only check that fresh installs get the right schema (suite uses
      # create_all(), never the baseline migration). MM_ENCRYPTION_ENABLED unset.
      - name: Schema-drift gate (models ↔ baseline migration)
        working-directory: backend
        run: python scripts/schema_diff_harness.py

      - name: Backend tests
        working-directory: backend
        run: python -m pytest tests/ -q

      - name: Backend dependency audit (HARD gate, production deps)
        working-directory: backend
        run: pip-audit -r requirements.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Frontend lint + tests + build
        working-directory: frontend
        run: |
          npm run lint
          npm test
          npm run build
      - name: Frontend dependency audit (HARD gate)
        working-directory: frontend
        run: npm audit --audit-level=high

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - name: Electron unit tests
        working-directory: electron
        run: |
          npm ci
          npm test

  # ── Package: one runner per platform/arch ───────────────────────────────────
  # The backend is a NATIVE PyInstaller bundle, so each arch must build on its own
  # native runner — there is no cross-compile. macos-14 = Apple Silicon (arm64).
  # All three publish to the same draft release for the tag.
  package:
    needs: verify
    # 45 (was 30): the mac path now does TWO notarization round-trips (app in
    # "Package & publish", then the dmg in "Notarize + staple the DMG"), each
    # step self-capped (20 + 15) so a notarization hang still aborts fast.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Full release matrix. The backend is a NATIVE PyInstaller bundle, so each arch
        # builds on its own native runner (no cross-compile): macos-14 = Apple Silicon.
        # Every entry was validated individually during the 2026-06-14 signing/packaging
        # bring-up — mac sign+notarize+backend-boot-smoke, windows Azure signing, linux.
        #
        # macOS INTEL (macos-13) WAS REMOVED 2026-07-10 (#29 S1). It habitually hung on
        # GitHub's scarce Intel runners and v1.1.1 shipped without an Intel dmg anyway;
        # nothing (README, website, release notes) promises Intel. Keeping it meant every
        # release waited out a 45-minute timeout, and a hung leg silently produced a
        # single-arch latest-mac.yml — which strands the missing arch on every future
        # auto-update. Re-adding a mac arch means adding it HERE and to EXPECTED_ARCHES
        # in the finalize-mac-manifest job below; the two must never disagree.
        include:
          - os: macos-14
            eb_target: mac
            eb_arch: arm64
          - os: windows-latest
            eb_target: win
            eb_arch: x64
          - os: ubuntu-latest
            eb_target: linux
            eb_arch: x64
    runs-on: ${{ matrix.os }}
    # bash everywhere (Windows runners ship Git bash) so the build steps are uniform.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      # 1) Build the SPA first — the PyInstaller spec bundles frontend/dist into the
      #    backend (config.dist_dir() serves it same-origin under the frozen app).
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # 2) Freeze the backend (onedir) → backend/dist/mm-backend/. requirements-dev
      #    carries pyinstaller. This is arch-native to the runner.
      - name: Freeze backend (PyInstaller)
        working-directory: backend
        run: |
          pip install -r requirements-dev.txt
          pyinstaller mixedmeasures.spec

      # 2b) Smoke the FROZEN backend on this OS — the one macOS-functional check we can
      #     do without a real Mac. Boots the onedir binary against a throwaway temp DB
      #     (so it runs Alembic migrations + app startup exactly like a first launch) and
      #     asserts /health → 200. Gatekeeper/GUI still need a real desktop, but "does the
      #     packaged app actually start on this OS" is the real risk, and this proves it.
      #     Runs on mac + linux (unix); Windows is already validated by a manual install.
      #     #535 (#29 S1/D11): then drives the REAL dataset-preview endpoint with the
      #     committed SPSS fixture — pyreadstat ships its parser as a Cython extension
      #     resolved by dynamic import, so "the spec collects it" is a claim the source-
      #     tree test suite can never prove; parsing a .sav INSIDE the frozen bundle is
      #     the proof. A collection miss surfaces here as a 400/500 on preview.
      - name: Smoke — frozen backend boots + /health + .sav preview (#535)
        if: matrix.eb_target != 'win'
        working-directory: backend
        run: |
          PORT=8765
          TMP="$(mktemp -d)"
          echo "launching frozen backend on 127.0.0.1:$PORT (throwaway data → $TMP)"
          MM_PORT="$PORT" \
          MM_DATABASE_PATH="$TMP/smoke.db" \
          MM_DATA_DIR="$TMP/data" \
          MM_BACKUP_DIR="$TMP/backups" \
          MM_PACKAGED=1 \
          MM_ENABLE_API_DOCS=false \
          MM_CORS_ORIGINS='' \
          PYTHONDONTWRITEBYTECODE=1 \
          ./dist/mm-backend/mm-backend > "$TMP/backend.log" 2>&1 &
          BPID=$!
          ok=0
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:$PORT/health" >/dev/null 2>&1; then ok=1; break; fi
            kill -0 "$BPID" 2>/dev/null || { echo "backend process exited early"; break; }
            sleep 1
          done

          sav_ok=0
          if [ "$ok" = "1" ]; then
            # Single-user auto-auth: the first /auth/status mints the coder + session
            # cookie + CSRF in one call (curl's jar handles the HttpOnly cookie).
            JAR="$TMP/cookies.txt"
            CSRF="$(curl -fsS -c "$JAR" "http://127.0.0.1:$PORT/api/auth/status" | jq -r '.user.csrf_token')" || CSRF=""
            if [ -n "$CSRF" ] && [ "$CSRF" != "null" ]; then
              PROJ="$(curl -fsS -b "$JAR" -H "X-CSRF-Token: $CSRF" -H 'Content-Type: application/json' \
                -d '{"name":"frozen smoke"}' "http://127.0.0.1:$PORT/api/projects" | jq -r '.id')" || PROJ=""
              if [ -n "$PROJ" ] && [ "$PROJ" != "null" ]; then
                PREVIEW="$(curl -fsS -b "$JAR" -H "X-CSRF-Token: $CSRF" \
                  -F "file=@tests/reference_data/spss_sample.sav" \
                  "http://127.0.0.1:$PORT/api/projects/$PROJ/datasets/preview")" || PREVIEW=""
                COLS="$(echo "$PREVIEW" | jq '.columns | length' 2>/dev/null)" || COLS=0
                ORDINALS="$(echo "$PREVIEW" | jq '[.columns[] | select(.suggested_type=="ordinal")] | length' 2>/dev/null)" || ORDINALS=0
                echo ".sav preview: columns=$COLS ordinal-suggestions=$ORDINALS"
                if [ "$COLS" = "6" ] && [ "${ORDINALS:-0}" -ge 2 ]; then
                  sav_ok=1
                else
                  echo "----- preview response -----"; echo "$PREVIEW" | head -c 2000; echo
                fi
              else
                echo "project create failed (no id)"
              fi
            else
              echo "auth bootstrap failed (no csrf from /api/auth/status)"
            fi
          fi

          echo "----- backend log (tail) -----"; tail -50 "$TMP/backend.log" 2>/dev/null || true
          kill "$BPID" 2>/dev/null || true; wait "$BPID" 2>/dev/null || true
          if [ "$ok" != "1" ]; then
            echo "❌ frozen backend never became healthy on ${{ matrix.os }}"; exit 1
          fi
          if [ "$sav_ok" != "1" ]; then
            echo "❌ frozen .sav preview failed on ${{ matrix.os }} — pyreadstat's Cython ext likely missing from the bundle (#535)"; exit 1
          fi
          echo "✅ frozen backend booted + /health 200 + .sav preview parsed (pyreadstat frozen-proof, #535) on ${{ matrix.os }}"

      # 3) Package + (conditionally) sign + publish to the draft release.
      #    electron-builder signs macOS automatically when CSC_LINK is present and
      #    builds unsigned otherwise; the notarize/azure config overrides are only
      #    injected when their creds exist, so the unsigned path never errors.
      - name: Package & publish
        # Hard cap so a hung notarization can't burn 10x mac minutes (the rc2 lesson).
        timeout-minutes: 20
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Azure Trusted Signing (service principal → DefaultAzureCredential)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE: ${{ secrets.AZURE_CERT_PROFILE }}
        run: |
          set -euo pipefail
          npm ci

          ARGS=( "--${{ matrix.eb_target }}" "--${{ matrix.eb_arch }}" "--publish" "always" )

          # Tell electron-builder WHERE to publish. It can't reliably auto-detect the repo
          # from .git/config when run from electron/ on a CI checkout, so set owner/repo
          # explicitly — derived from $GITHUB_REPOSITORY ("owner/name", auto-set by Actions)
          # so the SAME config works in any repo (private test repo OR the public release
          # repo) with zero package.json edits.
          ARGS+=( "--config.publish.provider=github" \
                  "--config.publish.owner=${GITHUB_REPOSITORY%%/*}" \
                  "--config.publish.repo=${GITHUB_REPOSITORY##*/}" \
                  "--config.publish.releaseType=draft" )

          # Enable notarization only when an Apple Developer ID cert is configured.
          # `notarize=true` makes electron-builder run notarytool, which reads
          # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID from the env below.
          # (The older `notarize.teamId` form was wrong — eb warned to use the env var —
          # and left notarytool hanging without credentials; the rc2 lesson.)
          if [ "${{ matrix.eb_target }}" = "mac" ] && [ -n "${CSC_LINK:-}" ]; then
            ARGS+=( "--config.mac.notarize=true" )
          fi

          # Enable Azure Trusted Signing only when its service principal is configured.
          # The RFC-3161 TIMESTAMP is NOT optional: Azure Trusted Signing certs are short-lived
          # (~3 days), so an un-timestamped signature silently goes invalid days after the build
          # and Windows shows "Unknown publisher" to every user (the v1.0.0 win defect). electron-
          # builder 25's Invoke-TrustedSigning wrapper sets NO timestamp by default; the two
          # TimestampRfc3161/TimestampDigest keys below flow through to the cmdlet via its
          # extraSigningArgs spread (windowsSignAzureManager.js). Ref: electron-builder#8626.
          # The verify gate near the end of this job hard-fails if the timestamp is ever missing.
          if [ "${{ matrix.eb_target }}" = "win" ] && [ -n "${AZURE_TENANT_ID:-}" ]; then
            ARGS+=( "--config.win.azureSignOptions.endpoint=${AZURE_ENDPOINT}" \
                    "--config.win.azureSignOptions.codeSigningAccountName=${AZURE_CODE_SIGNING_NAME}" \
                    "--config.win.azureSignOptions.certificateProfileName=${AZURE_CERT_PROFILE}" \
                    "--config.win.azureSignOptions.TimestampRfc3161=http://timestamp.acs.microsoft.com" \
                    "--config.win.azureSignOptions.TimestampDigest=SHA256" )
          fi

          echo "electron-builder ${ARGS[*]}"
          npx --no-install electron-builder "${ARGS[@]}"

      # 3a2) Notarize + staple the DMG itself (macOS, signed path only). electron-builder
      #      notarizes & staples the .app but NOT the .dmg container, so `stapler validate`
      #      on the dmg fails the Gatekeeper gate below (the rc2 finding). Submit the dmg to
      #      notarytool, staple the returned ticket, then re-upload the now-stapled dmg over
      #      the un-stapled one electron-builder already pushed to the draft release, so the
      #      file users download carries an offline-verifiable ticket (Apple's recommended
      #      practice for dmg distribution).
      #      ⚠ latest-mac.yml is LOAD-BEARING since the auto-updater (#29): stapling changes
      #      the dmg bytes AFTER electron-builder computed the manifest entry, so the local
      #      manifest is re-patched here (update-manifest.js recomputes sha512/size) BEFORE
      #      the next step publishes it. Never re-upload a mac artifact without re-patching —
      #      a stale hash fails every mac update at validation.
      - name: Notarize + staple the DMG (macOS)
        if: matrix.eb_target == 'mac'
        timeout-minutes: 15
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # Unsigned dev path (no creds) → nothing to notarize; leave the dmg as built.
          if [ -z "${CSC_LINK:-}" ]; then
            echo "unsigned path (no CSC_LINK) — skipping dmg notarization"; exit 0
          fi
          DMG="$(find release -maxdepth 1 -name '*.dmg' -print -quit)"
          if [ -z "${DMG:-}" ]; then echo "❌ no .dmg found under release/"; exit 1; fi
          echo "notarizing dmg: $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          echo "✅ dmg notarized + stapled"
          # The staple rewrote the dmg → recompute its manifest entry (sha512/size)
          # in the LOCAL latest-mac.yml before anything publishes it (#29 S1).
          node scripts/update-manifest.js patch release/latest-mac.yml release
          # Replace the un-stapled dmg electron-builder already pushed to the draft release
          # (tag = v<version>, the release electron-builder publishes to).
          VERSION="$(node -p "require('./package.json').version")"
          echo "re-uploading stapled dmg to draft release v${VERSION}"
          gh release upload "v${VERSION}" "$DMG" --clobber --repo "$GITHUB_REPOSITORY"

      # 3a3) Publish this arch's update manifest under an ARCH-SPECIFIC name (#29 S1).
      #      Each mac leg generates a latest-mac.yml listing only its OWN arch's files;
      #      if two legs publish under the SAME name it is last-writer-wins and the
      #      losing arch hash-mismatches on every update. So each leg uploads
      #      latest-mac-<arch>.yml (patched by 3a2 on the signed path, as-built on the
      #      unsigned path) and the finalize-mac-manifest job below merges them into the
      #      one latest-mac.yml electron-updater actually reads, then removes these
      #      helper assets. Draft-only visibility until the human publishes.
      #      The indirection is kept at one mac arch on purpose: it is what makes
      #      re-adding an arch a two-line change instead of a rediscovered bug.
      - name: Publish per-arch update manifest (macOS)
        if: matrix.eb_target == 'mac'
        timeout-minutes: 5
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f release/latest-mac.yml ]; then
            echo "❌ release/latest-mac.yml missing — electron-builder should have generated it"; exit 1
          fi
          VERSION="$(node -p "require('./package.json').version")"
          cp release/latest-mac.yml "latest-mac-${{ matrix.eb_arch }}.yml"
          gh release upload "v${VERSION}" "latest-mac-${{ matrix.eb_arch }}.yml" \
            --clobber --repo "$GITHUB_REPOSITORY"
          echo "✅ uploaded latest-mac-${{ matrix.eb_arch }}.yml (merged by finalize-mac-manifest)"

      # 3b) Gatekeeper / signature verification (macOS) — the headless equivalent of the
      #     "double-click on a clean Mac" smoke. `spctl --assess` IS the Gatekeeper engine,
      #     so a green assessment here means a real Gatekeeper accept; codesign + stapler
      #     confirm the signature is a Developer ID and the notarization ticket is stapled.
      #     electron-builder's own `gatekeeperAssess` is off, so nothing else covers this.
      #     HARD-fails only when signing creds are present — a signed build that won't pass
      #     Gatekeeper must stop the release. On the credential-free unsigned path (no
      #     CSC_LINK) it reports informationally so the unsigned build stays green and the
      #     step flips to enforcing automatically once the secrets land.
      - name: Verify — codesign + notarization + Gatekeeper (macOS)
        if: matrix.eb_target == 'mac'
        timeout-minutes: 5
        working-directory: electron
        env:
          SIGNED: ${{ secrets.CSC_LINK != '' }}
        run: |
          set -uo pipefail   # NOT -e: run every check, aggregate, decide at the end
          APP="$(find release -maxdepth 4 -name '*.app' -print -quit)"
          DMG="$(find release -maxdepth 1 -name '*.dmg' -print -quit)"
          echo "app: ${APP:-<none>}   dmg: ${DMG:-<none>}   signed=${SIGNED}"
          if [ -z "${APP:-}" ]; then echo "❌ no .app found under release/ — nothing to verify"; exit 1; fi

          fail=0
          check() {  # check "<label>" <cmd...>; hard-fails only on the signed path
            local label="$1"; shift
            if "$@" >/dev/null 2>&1; then
              echo "✅ $label"
            elif [ "$SIGNED" = "true" ]; then
              echo "❌ $label  (signed build MUST pass)"; fail=1
            else
              echo "⚠️  $label  — expected on the unsigned path (no signing creds)"
            fi
          }

          check "codesign --verify --deep --strict"        codesign --verify --deep --strict --verbose=2 "$APP"
          check "signature is Developer ID Application"     bash -c "codesign --display --verbose=4 '$APP' 2>&1 | grep -q 'Authority=Developer ID Application'"
          check "spctl Gatekeeper assess (execute)"         spctl --assess --type execute --verbose "$APP"
          check "stapler validate (.app notarization)"      xcrun stapler validate "$APP"
          [ -n "${DMG:-}" ] && check "stapler validate (.dmg)" xcrun stapler validate "$DMG"

          if [ "$fail" = "1" ]; then echo "GATEKEEPER GATE: ❌ FAIL"; exit 1; fi
          echo "GATEKEEPER GATE: ✅ PASS ($([ "$SIGNED" = "true" ] && echo 'signed — enforced' || echo 'unsigned — informational'))"

      # 3c) Real OS-keyring CROSS-LAUNCH round-trip — the piece the stubbed key-manager
      #     unit tests can't cover: that Electron's *real* safeStorage (macOS Keychain)
      #     persists a wrapped key a SEPARATE, LATER process can decrypt to the same bytes
      #     (i.e. "quit the app and reopen — your encrypted DB still opens"). The harness
      #     spawns three independent Electron processes (mint → resolve → recover) sharing
      #     one key file and asserts the keys match.
      #     BEST-EFFORT: a flaky/headless keyring must never block a signed release, so this
      #     is continue-on-error with a hard timeout (each child self-times-out, so a Keychain
      #     prompt can't hang it — it SKIPs honestly). The RESULT line is the signal; only the
      #     first-launch permission-prompt UX + a real GUI install stay the human soft-launch check.
      - name: Smoke — real OS keyring cross-launch round-trip (macOS, best-effort)
        if: matrix.eb_target == 'mac'
        continue-on-error: true
        timeout-minutes: 5
        working-directory: electron
        run: |
          set -o pipefail
          npx --no-install electron scripts/keychain-smoke.js 2>&1 | sed 's/^/  /'

      # 3d) Authenticode signature + TIMESTAMP verification (Windows) — the missing mirror of the
      #     macOS Gatekeeper gate (3b), and the check that would have caught the v1.0.0 win defect.
      #     Get-AuthenticodeSignature is the headless equivalent of the SmartScreen verdict:
      #       - Status = Valid           → the chain is trusted RIGHT NOW (freshly-signed cert valid)
      #       - TimeStamperCertificate ≠ null → the signature is RFC-3161 timestamp-anchored, so it
      #                                    OUTLIVES the ~3-day Azure Trusted Signing cert. Without
      #                                    this the sig looks fine for ~3 days then flips to
      #                                    "Unknown publisher" for every user — invisible to a
      #                                    same-day check, which is exactly how v1.0.0 shipped.
      #     Both are HARD gates on the signed path (AZURE_TENANT_ID present); informational on the
      #     credential-free unsigned path, so the step flips to enforcing automatically once the
      #     Azure secrets exist. Runs post-publish like the mac gate — a failure stops the workflow
      #     and you simply don't un-draft the release (delete the bad asset + re-run).
      - name: Verify — Authenticode signature + timestamp (Windows)
        if: matrix.eb_target == 'win'
        timeout-minutes: 5
        shell: pwsh
        working-directory: electron
        env:
          SIGNED: ${{ secrets.AZURE_TENANT_ID != '' }}
        run: |
          $signed = $env:SIGNED -eq 'true'
          $exe = Get-ChildItem -Path release -Filter *.exe -File | Select-Object -First 1
          if (-not $exe) { Write-Host "no .exe found under release/ — nothing to verify"; exit 1 }
          Write-Host "file: $($exe.Name)   signed=$signed"

          $sig = Get-AuthenticodeSignature -FilePath $exe.FullName
          $publisher = if ($sig.SignerCertificate) { $sig.SignerCertificate.Subject } else { '<none>' }
          $timestamped = $null -ne $sig.TimeStamperCertificate
          Write-Host "Status      : $($sig.Status)"
          Write-Host "Publisher   : $publisher"
          Write-Host "Timestamped : $timestamped"
          if ($timestamped) { Write-Host "Timestamp CA: $($sig.TimeStamperCertificate.Subject)" }

          $fail = $false
          function Check([string]$label, [bool]$ok) {
            if ($ok)            { Write-Host "PASS  $label" }
            elseif ($signed)    { Write-Host "FAIL  $label  (signed build MUST pass)"; $script:fail = $true }
            else                { Write-Host "WARN  $label  — expected on the unsigned path (no Azure creds)" }
          }

          Check "Authenticode status is Valid"            ($sig.Status -eq 'Valid')
          Check "signature carries an RFC-3161 timestamp" ($timestamped)

          if ($fail) { Write-Host "WINDOWS SIGNING GATE: FAIL"; exit 1 }
          $mode = if ($signed) { 'signed — enforced' } else { 'unsigned — informational' }
          Write-Host "WINDOWS SIGNING GATE: PASS ($mode)"

      # 4) Restore the human-facing download/install instructions onto the release body.
      #    electron-builder creates the GitHub Release with an EMPTY body, so the curated
      #    "which file do I download / first launch" notes — previously typed by hand in the UI
      #    and therefore LOST on every automated release — are templated in
      #    .github/release-notes-template.md and rendered here (__VERSION__/__REPO__ substituted).
      #    Gated to one leg (linux) so concurrent PATCHes can't race on the same release body.
      #    success() implied, so it only runs if this leg's build/publish succeeded; tag-only
      #    (dispatch has no version).
      #
      #    The release is named for the PACKAGE version, NOT the git tag: electron-builder's
      #    GitHub publisher derives the release name from electron/package.json, so an -rc tag
      #    (v1.2.0-rc1) publishes a draft named v1.2.0. Reading GITHUB_REF_NAME here made this
      #    step `gh release edit v1.2.0-rc1` → "release not found", failing every rc run at the
      #    last step (and it would have rendered "1.2.0-rc1" into the notes body). Derive the
      #    version the same way every other publish step in this workflow does.
      - name: Set release notes from template
        if: github.ref_type == 'tag' && matrix.eb_target == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./electron/package.json').version")"
          TAG="v${VERSION}"
          RENDERED="$(mktemp)"
          sed -e "s/__VERSION__/${VERSION}/g" -e "s#__REPO__#${GITHUB_REPOSITORY}#g" \
            "${GITHUB_WORKSPACE}/.github/release-notes-template.md" > "$RENDERED"
          gh release edit "$TAG" --repo "${GITHUB_REPOSITORY}" --notes-file "$RENDERED"
          echo "release notes applied to $TAG from template"

  # ── Finalize the mac update manifest (#29 S1) ────────────────────────────────
  # Merges the per-arch latest-mac-{arm64,x64}.yml helper assets (uploaded by
  # step 3a3) into the single latest-mac.yml electron-updater reads, replacing
  # whichever single-arch manifest electron-builder's publishers left behind
  # (last-writer-wins clobber), then deletes the helpers. Runs even when a mac
  # leg failed (`!cancelled()`): merging ONE manifest is a valid single-arch
  # passthrough, and the run's failed leg already flags the release as broken.
  # Cheap ubuntu job — no packaging, just gh + the dependency-free merge script.
  # ── Merge the mac legs' per-arch manifests into the one the updater reads ────
  # `!cancelled()` (not `success()`) so a failed win/linux leg can't leave the draft
  # with an un-merged mac manifest. NOTE the corollary: CANCELLING THE RUN CANCELS
  # THIS JOB TOO. Never `gh run cancel` to kill a stuck leg — let it hit the package
  # job's 45-minute timeout, which is a *failure*, not a cancellation, so this still
  # runs. (Cancelling leaves latest-mac-<arch>.yml helpers on the draft — a release
  # in that state must not be published; its latest-mac.yml is single-arch.)
  finalize-mac-manifest:
    needs: package
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Merge per-arch manifests → latest-mac.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # MUST list exactly the `eb_arch` of every `eb_target: mac` entry in the
          # package matrix above. This is the guard that makes a dead mac leg LOUD:
          # merging whatever happens to be present would publish a single-arch
          # latest-mac.yml, and the arches missing from it hash-mismatch — i.e. never
          # update again — with nothing failing. Drift in either direction is fatal,
          # so an unexpected arch fails too.
          EXPECTED_ARCHES=( arm64 )

          VERSION="$(node -p "require('./electron/package.json').version")"
          TAG="v${VERSION}"
          WORK="$(mktemp -d)"

          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern 'latest-mac-*.yml' --dir "$WORK" || true

          # Every expected arch must have uploaded its manifest in step 3a3.
          missing=()
          for arch in "${EXPECTED_ARCHES[@]}"; do
            [ -f "$WORK/latest-mac-${arch}.yml" ] || missing+=( "$arch" )
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ no per-arch mac manifest for: ${missing[*]}"
            echo "   That leg never reached 'Publish per-arch update manifest' (it failed,"
            echo "   timed out, or was cancelled). The draft's latest-mac.yml is whatever a"
            echo "   single electron-builder leg last uploaded — publishing it strands the"
            echo "   missing arch on every future auto-update. Fix the leg and re-run, or"
            echo "   drop the arch from BOTH the matrix and EXPECTED_ARCHES."
            exit 1
          fi

          # And nothing unexpected: a manifest for an arch we don't build means the
          # matrix and EXPECTED_ARCHES have drifted apart.
          for f in "$WORK"/latest-mac-*.yml; do
            [ -e "$f" ] || continue
            arch="$(basename "$f")"; arch="${arch#latest-mac-}"; arch="${arch%.yml}"
            case " ${EXPECTED_ARCHES[*]} " in
              *" ${arch} "*) ;;
              *) echo "❌ unexpected per-arch manifest 'latest-mac-${arch}.yml' — the package"
                 echo "   matrix and EXPECTED_ARCHES in this job have drifted. Reconcile them."
                 exit 1 ;;
            esac
          done

          INPUTS=()
          for arch in "${EXPECTED_ARCHES[@]}"; do INPUTS+=( "$WORK/latest-mac-${arch}.yml" ); done
          echo "merging: ${INPUTS[*]##*/}"
          node electron/scripts/update-manifest.js merge "$WORK/latest-mac.yml" "${INPUTS[@]}"
          echo "----- merged latest-mac.yml -----"
          cat "$WORK/latest-mac.yml"

          gh release upload "$TAG" "$WORK/latest-mac.yml" --clobber --repo "$GITHUB_REPOSITORY"
          for f in "${INPUTS[@]}"; do
            gh release delete-asset "$TAG" "$(basename "$f")" --yes --repo "$GITHUB_REPOSITORY" || true
          done
          echo "✅ merged manifest published; per-arch helpers removed"
