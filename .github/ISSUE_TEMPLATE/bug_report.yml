name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include any
        confidential or participant research data in this report. If this is a
        security vulnerability, do not open a public issue — see `SECURITY.md`.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I…, I expected…, but instead…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the problem.
      placeholder: |
        1. Open a project with…
        2. Go to…
        3. Click…
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mixed Measures version
      description: Found in the app's Settings/About, or the release tag you installed.
      placeholder: e.g. v1.0.0
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How are you running it?
      options:
        - Packaged desktop app (installer)
        - From source (uvicorn + Vite dev server)
        - Docker
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Relevant console/log output or screenshots. Redact any real data.
      render: shell
    validations:
      required: false
